<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FEZAcademy — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        /* ─── Design Tokens ─────────────────────────────────────── */
        :root {
            --on: 0;

            /* Lamp colours — all driven by --on (0 = off, 1 = on) */
            --opening: hsl(270, calc((10 + var(--on) * 70) * 1%), calc((18 + var(--on) * 68) * 1%));
            --base-top: hsl(270, calc(var(--on) * 25%), calc((30 + var(--on) * 38) * 1%));
            --base-side: hsl(270, calc(var(--on) * 25%), calc((15 + var(--on) * 35) * 1%));
            --post: hsl(270, calc(var(--on) * 20%), calc((18 + var(--on) * 35) * 1%));
            --shade-l: hsl(270, calc(var(--on) * 35%), calc((28 + var(--on) * 55) * 1%));
            --shade-m: hsl(270, calc(var(--on) * 35%), calc((16 + var(--on) * 32) * 1%));
            --shade-d: hsl(270, calc(var(--on) * 35%), calc((9 + var(--on) * 18) * 1%));
            --blend-a: hsla(270, calc(var(--on) * 30%), calc((45 + var(--on) * 50) * 1%), 0.85);
            --blend-b: hsla(270, calc(var(--on) * 30%), calc((18 + var(--on) * 28) * 1%), 0.25);
            --blend-c: hsla(270, calc(var(--on) * 30%), calc((18 + var(--on) * 28) * 1%), 0.50);
            --glow-a: hsla(270, calc(var(--on) * 40%), calc((40 + var(--on) * 55) * 1%), 0.85);
            --cord-l: calc((38 + var(--on) * 52) * 1%);

            /* App palette */
            --bg: #07000d;
            --pm: #3d0070;
            --pg: #8b2fc9;
            --pb: #c678f5;
            --pu: #e0a8ff;
            --acc: #bf5af2;
            --tp: #f0e4ff;
            --tm: #a07ec0;
            --glass: rgba(26, 4, 50, 0.65);
            --border: rgba(140, 50, 200, 0.28);
            --ibg: rgba(255, 255, 255, 0.043);
            --ibr: rgba(180, 100, 255, 0.18);

            /* Motion */
            --ease-spring: 0.88s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ─── Reset ──────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* ─── Base ───────────────────────────────────────────────── */
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ambient room glow when lamp is on */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 50% 65% at 60% 50%,
                    rgba(100, 20, 180, .38) 0%,
                    rgba(40, 5, 80, .12) 52%,
                    transparent 75%);
            opacity: var(--on);
            transition: opacity .9s ease;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Layout ─────────────────────────────────────────────── */
        .scene {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 80px;
        }

        /* ─── Lamp SVG ───────────────────────────────────────────── */
        .lamp {
            height: 46vmin;
            min-height: 300px;
            max-height: 420px;
            overflow: visible !important;
            flex-shrink: 0;
        }

        /* Cord colour driven by --cord-l */
        .lamp-cord {
            stroke: hsl(270, 0%, var(--cord-l));
            transition: stroke .1s;
        }

        .lamp-light {
            opacity: var(--on);
        }

        /* SVG fill helpers — resolved from CSS variables */
        .fill-opening {
            fill: var(--opening);
        }

        .fill-base-top {
            fill: var(--base-top);
        }

        .fill-base-side {
            fill: var(--base-side);
        }

        .fill-post {
            fill: var(--post);
        }

        .fill-shade {
            fill: var(--shade-d);
        }

        /* Hit zone for cord drag */
        .lamp-hit {
            cursor: grab;
            fill: transparent;
        }

        .lamp-hit:active {
            cursor: grabbing;
        }

        .scene{
            transform: scale(1.35);
        }

        .card{
            width:420px;
            padding:40px 34px;
        }

        .lamp{
            height:60vmin;
        }

        /* ─── Login Card ─────────────────────────────────────────── */
        .card {
            width: 320px;
            padding: 32px 28px 28px;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            border-radius: 22px;
            border: 1px solid var(--border);
            box-shadow: 0 22px 56px rgba(0, 0, 0, .72);
            opacity: 0;
            transform: scale(.90) translateX(12px);
            transition:
                opacity var(--ease-spring),
                transform var(--ease-spring),
                border-color var(--ease-spring),
                box-shadow var(--ease-spring);
            pointer-events: none;
            position: relative;
            overflow: hidden;
        }

        /* Subtle glass gloss */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: linear-gradient(138deg, rgba(255, 255, 255, .05) 0%, transparent 55%);
            pointer-events: none;
        }

        .card.is-active {
            opacity: 1;
            transform: scale(1) translateX(0);
            pointer-events: auto;
            border-color: rgba(170, 65, 255, .38);
            box-shadow:
                0 22px 56px rgba(0, 0, 0, .65),
                0 0 44px 3px rgba(118, 30, 192, .16),
                0 0 80px 12px rgba(55, 7, 110, .10);
        }

        /* Brand */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--pm), var(--pg));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(127, 26, 204, 0.5);
            flex-shrink: 0;
        }

        .brand-icon svg {
            width: 15px;
            height: 15px;
            fill: #fff;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.10rem;
            font-weight: 800;
            letter-spacing: -.02em;
            background: linear-gradient(130deg, var(--pu), var(--pb) 55%, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .brand-tag {
            font-size: .59rem;
            color: var(--tm);
            letter-spacing: .13em;
            text-transform: uppercase;
        }

        /* Headings */
        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.08rem;
            font-weight: 700;
            color: var(--tp);
            margin-bottom: 3px;
        }

        .card-sub {
            font-size: .72rem;
            color: var(--tm);
            margin-bottom: 18px;
        }

        .card-sep {
            width: 26px;
            height: 2px;
            background: linear-gradient(90deg, var(--pg), transparent);
            border-radius: 2px;
            margin-bottom: 16px;
        }

        /* Fields */
        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: .64rem;
            font-weight: 500;
            color: var(--tm);
            letter-spacing: .09em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .field-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-icon {
            position: absolute;
            left: 11px;
            color: var(--tm);
            pointer-events: none;
            display: flex;
            transition: color .28s;
        }

        .field-wrap:focus-within .field-icon {
            color: var(--acc);
        }

        .field-wrap input {
            width: 100%;
            padding: 10px 11px 10px 35px;
            background: var(--ibg);
            border: 1px solid var(--ibr);
            border-radius: 10px;
            color: var(--tp);
            font-family: 'DM Sans', sans-serif;
            font-size: .84rem;
            outline: none;
            transition: border-color .28s, box-shadow .28s, background .28s;
        }

        .field-wrap input::placeholder {
            color: rgba(160, 126, 192, .26);
        }

        .field-wrap input:focus {
            border-color: var(--acc);
            background: rgba(140, 47, 201, .07);
            box-shadow: 0 0 0 3px rgba(140, 47, 201, .12);
        }

        .field-toggle {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tm);
            display: flex;
            transition: color .25s;
            padding: 0;
        }

        .field-toggle:hover {
            color: var(--acc);
        }

        /* Forgot link */
        .forgot {
            display: flex;
            justify-content: flex-end;
            margin-top: -4px;
            margin-bottom: 16px;
        }

        .forgot a {
            font-size: .67rem;
            color: var(--pb);
            text-decoration: none;
            transition: color .22s;
        }

        .forgot a:hover {
            color: var(--pu);
        }

        /* Submit */
        .btn-submit {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, var(--pm), var(--pg));
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: .87rem;
            font-weight: 700;
            letter-spacing: .04em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .18s, box-shadow .28s;
            box-shadow: 0 4px 20px rgba(85, 13, 165, .42);
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 45%;
            height: 200%;
            background: rgba(255, 255, 255, .13);
            transform: skewX(-20deg);
            transition: left .42s ease;
        }

        .btn-submit:hover::after {
            left: 115%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 26px rgba(85, 13, 165, .55);
        }

        .btn-submit:active {
            transform: scale(.98);
        }

        /* Sign-up nudge */
        .signup {
            text-align: center;
            margin-top: 14px;
            font-size: .72rem;
            color: var(--tm);
        }

        .signup a {
            color: var(--pb);
            text-decoration: none;
            font-weight: 500;
            transition: color .22s;
        }

        .signup a:hover {
            color: var(--pu);
        }

        /* Shake on empty submit */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }
    </style>
</head>

<body>

    <div class="scene">

        <!-- ══════════════════════════════════════════
       LAMP

        <svg class="lamp" viewBox="0 0 333 484" fill="none" xmlns="http://www.w3.org/2000/svg">

            <!-- Base -->
            <path class="fill-base-side"
                d="M165 464c44.183 0 80-8.954 80-20v-14h-22.869c-14.519-3.703-34.752-6-57.131-6-22.379 0-42.612 2.297-57.131 6H85v14c0 11.046 35.817 20 80 20z" />

                fill="url(#grad-shade)" />

            <!-- Gradients -->
            <defs>
                <linearGradient id="grad-opening" x1="35" y1="220" x2="295" y2="220" gradientUnits="userSpaceOnUse">
                    <stop />
                    <stop offset="1" stop-opacity="0" />
                </linearGradient>
                <linearGradient id="grad-base" x1="85" y1="444" x2="245" y2="444" gradientUnits="userSpaceOnUse">
                    <stop stop-color="var(--blend-a)" />
                    <stop offset=".8" stop-color="var(--blend-b)" stop-opacity="0" />
                </linearGradient>
                <linearGradient id="grad-side" x1="119" y1="430" x2="245" y2="430" gradientUnits="userSpaceOnUse">
                    <stop stop-color="var(--blend-c)" />

    <script>
        /* ══════════════════════════════════════════════════════════════
           CORD PHYSICS
           Physics-based cord drag. On sufficient pull → toggleLight().
           Cord is rendered as a cubic bezier from anchor to tassel tip.
        ══════════════════════════════════════════════════════════════ */
        const ROOT = document.documentElement;
        const BODY = document.body;
        const card = document.getElementById('js-card');
        const cord = document.getElementById('js-cord');
        const hit = document.getElementById('js-hit');
        const lampEl = document.querySelector('.lamp');

        // SVG anchor (top of cord) and tassel rest position
        const AX = 124, AY = 190;
        const REST_X = 124, REST_Y = 348;
        const TRIGGER_DIST = 55;

        let dragging = false;
        let animating = false;
        let lightOn = false;
        let curX = REST_X, curY = REST_Y;

        // Convert screen coords → SVG coords
        function toSVG(sx, sy) {
            const pt = lampEl.createSVGPoint();
            pt.x = sx; pt.y = sy;
            return pt.matrixTransform(lampEl.getScreenCTM().inverse());
        }

        // Build a natural bezier path for the cord
        function buildCord(tx, ty) {
            const dx = tx - AX, dy = ty - AY;
            const sag = Math.max(4, 30 - Math.hypot(dx, dy) * 0.06);
            const c1x = AX + dx * 0.15 + sag, c1y = AY + dy * 0.30 + sag;
            const c2x = AX + dx * 0.70 - sag * 0.3, c2y = AY + dy * 0.72 - sag * 0.2;
            return `M${AX},${AY} C${c1x},${c1y} ${c2x},${c2y} ${tx},${ty}`;
        }

        function updateCord(tx, ty) {
            curX = tx; curY = ty;
            cord.setAttribute('d', buildCord(tx, ty));
            const tension = Math.min(Math.hypot(tx - REST_X, ty - REST_Y) / 120, 1);
            cord.style.stroke = `hsl(270, 0%, ${Math.round(38 + tension * 52)}%)`;
        }

        function springBack(fromX, fromY, triggered) {
            if (animating) return;
            animating = true;
            const dur = triggered ? 380 : 500;
            const t0 = performance.now();

            function tick(now) {
                const t = Math.min((now - t0) / dur, 1);
                const fn = triggered ? easeElastic(t) : easeOutBounce(t);
                updateCord(fromX + (REST_X - fromX) * fn, fromY + (REST_Y - fromY) * fn);
                if (t < 1) { requestAnimationFrame(tick); return; }
                updateCord(REST_X, REST_Y);
                cord.style.stroke = '';
                animating = false;
            }
            requestAnimationFrame(tick);
        }

        // Easing functions
        function easeElastic(t) {
            if (!t || t === 1) return t;
            return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;
        }
        function easeOutBounce(t) {
            if (t < 1 / 2.75) return 7.5625 * t * t;
            if (t < 2 / 2.75) { t -= 1.5 / 2.75; return 7.5625 * t * t + 0.750; }
            if (t < 2.5 / 2.75) { t -= 2.25 / 2.75; return 7.5625 * t * t + 0.9375; }
            t -= 2.625 / 2.75; return 7.5625 * t * t + 0.984375;
        }

        // Pointer helpers
        function client(e) {
            return e.touches
                ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                : { x: e.clientX, y: e.clientY };
        }

        function onDown(e) {
            if (animating) return;
            e.preventDefault();
            dragging = true;
        }
        function onMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const { x, y } = client(e);
            const sv = toSVG(x, y);
            updateCord(sv.x, Math.max(AY + 20, sv.y));
        }
        function onUp() {
            if (!dragging) return;
            dragging = false;
            const dist = Math.hypot(curX - REST_X, curY - REST_Y);
            if (dist > TRIGGER_DIST) toggleLight();
            springBack(curX, curY, dist > TRIGGER_DIST);
        }

        // Attach events to both hit zone and cord line
        [hit, cord].forEach(el => {
            el.addEventListener('mousedown', onDown);
            el.addEventListener('touchstart', onDown, { passive: false });
        });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp);

        /* ══════════════════════════════════════════════════════════════
           LIGHT TOGGLE
        ══════════════════════════════════════════════════════════════ */
        const AUDIO = {
            CLICK: new Audio("https://fezacademy.com/click-sound.mp3"),
        };
        function toggleLight() {
            AUDIO.CLICK.play();
            lightOn = !lightOn;
            ROOT.style.setProperty('--on', lightOn ? '1' : '0');
            card.classList.toggle('is-active', lightOn);
        }

        /* ══════════════════════════════════════════════════════════════
           PASSWORD TOGGLE
        ══════════════════════════════════════════════════════════════ */
        const pwInput = document.getElementById('password');
        const eyeIcon = document.getElementById('js-eye');

        const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        const EYE_CLOSED = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

        document.getElementById('js-toggle-pw').addEventListener('click', () => {
            const show = pwInput.type === 'password';
            pwInput.type = show ? 'text' : 'password';
            eyeIcon.innerHTML = show ? EYE_CLOSED : EYE_OPEN;
        });

        /* ══════════════════════════════════════════════════════════════
           FORM SUBMIT
        ══════════════════════════════════════════════════════════════ */
        document.getElementById('js-submit').addEventListener('click', function () {
            const email = document.getElementById('email').value.trim();
            const pass = pwInput.value;

            if (!email || !pass) {
                this.style.animation = 'none';
                void this.offsetHeight; // reflow
                this.style.animation = 'shake .4s ease';
                return;
            }

            this.disabled = true;
            this.textContent = 'Đang đăng nhập…';

            setTimeout(() => {
                this.textContent = '✓ Chào mừng trở lại!';
                this.style.background = 'linear-gradient(135deg, #1a5c35, #27ae60)';
                this.style.boxShadow = '0 6px 24px rgba(39, 174, 96, .45)';
                window.location.href = 'https://sites.google.com/view/ggsites-amthucvn/trang-ch%E1%BB%A7';
            }, 1200);
        });

        const registerBtn = document.getElementById("js-register");
        const submitBtn = document.getElementById("js-submit");

        const title = document.querySelector(".card-title");
        const sub = document.querySelector(".card-sub");
        const brand = document.querySelector(".brand-name");

        let registerMode = false;

        registerBtn.addEventListener("click", function(e){

        e.preventDefault();

        registerMode = !registerMode;

        if(registerMode){

        brand.textContent = "Đăng ký";
        title.textContent = "Tạo tài khoản";
        sub.textContent = "Điền thông tin để đăng ký";

        submitBtn.textContent = "Đăng ký";

        registerBtn.textContent = "Quay lại đăng nhập";

    }else{

        brand.textContent = "Đăng nhập";
        title.textContent = "Chào mừng trở lại";
        sub.textContent = "Đăng nhập để tiếp tục";

        submitBtn.textContent = "Đăng nhập";

        registerBtn.textContent = "Đăng ký";

    }

    });
    </script>

</body>

</html>
